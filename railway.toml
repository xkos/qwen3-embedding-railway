[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
# Use Dockerfile HEALTHCHECK
healthcheckPath = ""
healthcheckTimeout = 300

[deploy.environmentVariables]
PORT = "8080"
PLATFORM = "hf"
MODEL_NAME = "Qwen/Qwen3-Embedding-4B-GGUF"
MODEL_FILENAME = "Qwen3-Embedding-4B-Q4_K_M.gguf"
CONTEXT_SIZE = "10240"
# API_KEY must be set in Railway Dashboard (no default here)

# Persist models in Railway volume
[[deploy.volumes]]
mountPath = "/models"
name = "models"
